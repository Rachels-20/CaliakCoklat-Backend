spring:
    application:
        name: server-eureka
server:
    port: 8761
eureka:
    client:
        register-with-eureka: false
        fetch-registry: false
logging:
    level:
        com.netflix.eureka: OFF
        com.netflix.discovery: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
